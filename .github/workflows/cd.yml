# GitHub Actionsの画面に表示されるワークフロー名
name: .NET CS_WebApp CD

# CIワークフローがmainブランチで完了したときに実行
on:
  workflow_run:
    workflows:
      - ".NET CS_WebApp CI"
    types:
      - completed
    branches:
      - main

# リポジトリの読み取りだけを許可
permissions:
  contents: read

jobs:
  deploy:
    # CIが成功した場合のみデプロイ
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    env:
      # 実際のcsprojの場所
      PROJECT_PATH: Apps/A_exercise_DB.Presentations/A_exercise_DB.Presentations.csproj

      # Azure VM上の配置先
      APP_DIR: /home/azureuser/apps/a-exercise-db

      # Azure VMに登録したsystemdサービス名
      SERVICE_NAME: a-exercise-api

      # SSH接続情報
      AZURE_HOST: ${{ secrets.AZURE_HOST }}
      AZURE_USER: ${{ secrets.AZURE_USER }}
      SSH_PORT: "22"

    steps:
      # CIでテストされたコミットを取得
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # .NET SDKを準備
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # 依存関係を復元
      - name: Restore
        run: dotnet restore "${PROJECT_PATH}"

      # Azureへ配置するファイルを作成
      - name: Publish
        run: |
          dotnet publish "${PROJECT_PATH}" \
            --configuration Release \
            --output publish \
            --no-restore

      # PublishされたDLL名などを確認
      - name: Show published files
        run: |
          find publish \
            -maxdepth 1 \
            -type f \
            -printf '%f\n' \
            | sort

      # Secretに登録した秘密鍵をSSH用ファイルとして準備
      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.TRAININGSERVER_KEY }}
        run: |
          mkdir -p ~/.ssh

          printf '%s\n' "${SSH_PRIVATE_KEY}" \
            | tr -d '\r' \
            > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan \
            -p "${SSH_PORT}" \
            -H "${AZURE_HOST}" \
            >> ~/.ssh/known_hosts

          chmod 600 ~/.ssh/known_hosts

      # SSH接続を確認
      - name: Check SSH connection
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -p "${SSH_PORT}" \
            "${AZURE_USER}@${AZURE_HOST}" \
            "echo 'SSH connection successful' && hostname"

      # Publish結果を圧縮
      - name: Create deployment archive
        run: |
          tar \
            -czf backend.tar.gz \
            -C publish \
            .

      # Azure VMへ転送
      - name: Upload backend
        run: |
          scp \
            -i ~/.ssh/id_rsa \
            -P "${SSH_PORT}" \
            backend.tar.gz \
            "${AZURE_USER}@${AZURE_HOST}:/tmp/backend.tar.gz"

      # Azure VM上で配置・サービス再起動
      - name: Deploy backend
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -p "${SSH_PORT}" \
            "${AZURE_USER}@${AZURE_HOST}" \
            "
              set -e

              echo 'Create application directory'
              mkdir -p '${APP_DIR}'

              echo 'Stop existing service'
              sudo systemctl stop '${SERVICE_NAME}.service' || true

              echo 'Remove old application files'
              find '${APP_DIR}' \
                -mindepth 1 \
                -maxdepth 1 \
                -exec rm -rf {} +

              echo 'Extract new application files'
              tar \
                -xzf /tmp/backend.tar.gz \
                -C '${APP_DIR}'

              echo 'Remove deployment archive'
              rm -f /tmp/backend.tar.gz

              echo 'Reload systemd settings'
              sudo systemctl daemon-reload

              echo 'Enable service auto-start'
              sudo systemctl enable '${SERVICE_NAME}.service'

              echo 'Restart application service'
              sudo systemctl restart '${SERVICE_NAME}.service'

              echo 'Show application service status'
              sudo systemctl \
                --no-pager \
                --full \
                status '${SERVICE_NAME}.service'
            "