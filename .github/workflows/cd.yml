name: Backend CD

on:
  workflow_run:
    workflows: ["Backend CI"] # ci.ymlのnameと一致させる
    types: [completed]
    branches: [main]

  workflow_dispatch: # GitHub Actions画面から手動実行できる

permissions:
  contents: read

# 複数のデプロイを同時実行しない
concurrency:
  group: backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Azure VMへデプロイ
    runs-on: ubuntu-latest

    # ENABLE_PRODUCTION_DEPLOYがtrueの場合だけデプロイする
    #
    # 自動実行：
    # mainのBackend CIが成功した場合
    #
    # 手動実行：
    # GitHub Actions画面から実行した場合
    if: >-
      vars.ENABLE_PRODUCTION_DEPLOY == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      )

    env:
      # リポジトリ内のWeb APIプロジェクト
      PROJECT_PATH: Apps/A_exercise_DB.Presentations/A_exercise_DB.Presentations.csproj

      # Azure VM上の配置先
      DEPLOY_DIR: /var/www/fullness-api

      # 直前のデプロイ成果物を保存する場所
      BACKUP_DIR: /var/www/fullness-api.previous

      # systemdサービス
      SERVICE_NAME: fullness-api

      # Azure Blobコンテナ名
      AZURE_BLOB_CONTAINER_NAME: product-images

      # 起動確認に使用するURL
      HEALTHCHECK_URL: http://127.0.0.1:5000/swagger/index.html

    steps:
      # workflow_runの場合は、
      # Backend CIで検証されたコミットを取得する
      - name: CIで検証されたコミットをチェックアウト
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # 手動実行の場合はmainを取得する
      - name: mainをチェックアウト
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: main

      # .NET 10 SDKを準備する
      - name: .NET SDKをセットアップ
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # 依存パッケージを復元する
      - name: 依存パッケージを復元
        run: |
          dotnet restore "${PROJECT_PATH}"

      # Azure VMへ配置するファイルを作成する
      - name: 発行
        run: |
          dotnet publish "${PROJECT_PATH}" \
            --configuration Release \
            --output "${{ github.workspace }}/publish" \
            --no-restore

      # 発行結果を確認する
      - name: 発行結果を確認
        run: |
          set -euo pipefail

          test -f \
            "${{ github.workspace }}/publish/A_exercise_DB.Presentations.dll"

          echo "発行対象のDLLを確認しました"

      # GitHub Secretに登録したSSH秘密鍵を準備する
      - name: SSH鍵を準備
        env:
          SSH_PRIVATE_KEY: ${{ secrets.TRAININGSERVER_KEY }}
          VM_HOST: ${{ secrets.AZURE_HOST }}
          VM_USER: ${{ secrets.AZURE_USER }}
        run: |
          set -euo pipefail

          test -n "${SSH_PRIVATE_KEY}"
          test -n "${VM_HOST}"
          test -n "${VM_USER}"

          mkdir -p ~/.ssh

          printf '%s\n' "${SSH_PRIVATE_KEY}" \
            | tr -d '\r' \
            > ~/.ssh/deploy_key

          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan \
            -H "${VM_HOST}" \
            >> ~/.ssh/known_hosts

          chmod 600 ~/.ssh/known_hosts

      # SSH接続だけ先に確認する
      - name: SSH接続を確認
        env:
          VM_HOST: ${{ secrets.AZURE_HOST }}
          VM_USER: ${{ secrets.AZURE_USER }}
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            "${VM_USER}@${VM_HOST}" \
            "echo 'SSH connection successful' && hostname"

      # systemdが読み込むapi.envを作成する
      - name: 環境変数ファイルを生成
        shell: bash
        env:
          VM_HOST: ${{ secrets.AZURE_HOST }}
          DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
          AZURE_BLOB_CONNECTION_STRING: ${{ secrets.AZURE_BLOB_CONNECTION_STRING }}
        run: |
          set -euo pipefail

          test -n "${VM_HOST}"
          test -n "${DB_CONNECTION_STRING}"
          test -n "${AZURE_BLOB_CONNECTION_STRING}"
          test -n "${AZURE_BLOB_CONTAINER_NAME}"

          # EnvironmentFileは1設定1行なので、
          # Secretに改行が含まれていたら失敗させる
          for variable_name in \
            DB_CONNECTION_STRING \
            AZURE_BLOB_CONNECTION_STRING
          do
            variable_value="${!variable_name}"

            if [[ "${variable_value}" == *$'\n'* ]] ||
               [[ "${variable_value}" == *$'\r'* ]]; then
              echo "::error::${variable_name}に改行が含まれています"
              exit 1
            fi
          done

          umask 077

          {
            printf 'ASPNETCORE_ENVIRONMENT=Production\n'
            printf 'DOTNET_ENVIRONMENT=Production\n'
            printf 'ASPNETCORE_URLS=http://127.0.0.1:5000\n'

            # PostgreSQL
            printf 'ConnectionStrings__PostgreSQLConnection=%s\n' \
              "${DB_CONNECTION_STRING}"

            # Azure Blob Storage
            printf 'ImageStorage__Provider=AzureBlob\n'

            printf 'AzureBlobStorage__ConnectionString=%s\n' \
              "${AZURE_BLOB_CONNECTION_STRING}"

            printf 'AzureBlobStorage__ContainerName=%s\n' \
              "${AZURE_BLOB_CONTAINER_NAME}"

            # Cookie
            printf 'AuthCookie__Secure=false\n'

            # Swagger
            printf 'Swagger__Enabled=true\n'

            # CORS
            printf 'Cors__AllowedOrigins__0=http://%s\n' \
              "${VM_HOST}"
          } > api.env

          chmod 600 api.env

          # Secretの内容は表示せず、設定名だけ確認する
          sed \
            -E \
            's/=.*/=<masked>/' \
            api.env

      # VM上の一時配置先を準備する
      - name: VMの一時配置先を準備
        env:
          VM_HOST: ${{ secrets.AZURE_HOST }}
          VM_USER: ${{ secrets.AZURE_USER }}
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            "${VM_USER}@${VM_HOST}" \
            "rm -rf /tmp/fullness-publish &&
             mkdir -p /tmp/fullness-publish"

      # dotnet publishの成果物をVMへ送る
      - name: 成果物を転送
        env:
          VM_HOST: ${{ secrets.AZURE_HOST }}
          VM_USER: ${{ secrets.AZURE_USER }}
        run: |
          set -euo pipefail

          rsync \
            -az \
            --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            "${{ github.workspace }}/publish/" \
            "${VM_USER}@${VM_HOST}:/tmp/fullness-publish/"

      # api.envをVMへ送る
      - name: 環境変数ファイルを転送
        env:
          VM_HOST: ${{ secrets.AZURE_HOST }}
          VM_USER: ${{ secrets.AZURE_USER }}
        run: |
          set -euo pipefail

          scp \
            -i ~/.ssh/deploy_key \
            api.env \
            "${VM_USER}@${VM_HOST}:/tmp/api.env"

 # 現在の成果物をバックアップしてから、
      # 新しい成果物と環境変数ファイルを配置する
      - name: 成果物を配置
        env:
          VM_HOST: ${{ secrets.AZURE_HOST }}
          VM_USER: ${{ secrets.AZURE_USER }}
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            "${VM_USER}@${VM_HOST}" \
            "DEPLOY_DIR='${DEPLOY_DIR}' \
             BACKUP_DIR='${BACKUP_DIR}' \
             bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          test -n "${DEPLOY_DIR}"
          test -n "${BACKUP_DIR}"

          echo "=== 配置先を準備 ==="

          sudo mkdir -p \
            "${DEPLOY_DIR}/wwwroot/images/products"

          sudo mkdir -p \
            /etc/fullness

          echo "=== 現在の成果物をバックアップ ==="

          if sudo test -f \
            "${DEPLOY_DIR}/A_exercise_DB.Presentations.dll"; then

            sudo rm -rf \
              "${BACKUP_DIR}"

            sudo mkdir -p \
              "${BACKUP_DIR}"

            sudo rsync \
              -a \
              --delete \
              --exclude 'wwwroot/images/products/' \
              "${DEPLOY_DIR}/" \
              "${BACKUP_DIR}/"

            echo "現在の成果物を${BACKUP_DIR}へ保存しました"
          else
            echo "現在の成果物がないため、成果物のバックアップを省略します"
          fi

          echo "=== 現在のapi.envをバックアップ ==="

          if sudo test -f \
            /etc/fullness/api.env; then

            sudo cp \
              /etc/fullness/api.env \
              /etc/fullness/api.env.previous

            sudo chown \
              root:fullness \
              /etc/fullness/api.env.previous

            sudo chmod \
              640 \
              /etc/fullness/api.env.previous

            echo "現在のapi.envを保存しました"
          else
            echo "現在のapi.envがないため、バックアップを省略します"
          fi

          echo "=== 新しい成果物を配置 ==="

          sudo rsync \
            -a \
            --delete \
            --exclude 'wwwroot/images/products/' \
            /tmp/fullness-publish/ \
            "${DEPLOY_DIR}/"

          # systemdユニットのReadWritePathsとの互換性のため、
          # Azure Blob使用後もディレクトリは残す
          sudo mkdir -p \
            "${DEPLOY_DIR}/wwwroot/images/products"

          sudo chown \
            -R fullness:fullness \
            "${DEPLOY_DIR}"

          echo "=== 新しいapi.envを配置 ==="

          sudo install \
            -o root \
            -g fullness \
            -m 640 \
            /tmp/api.env \
            /etc/fullness/api.env
          REMOTE_SCRIPT

      # fullness-apiだけを再起動し、
      # 失敗した場合は直前の成果物へ戻す
      - name: サービスを再起動
        env:
          VM_HOST: ${{ secrets.AZURE_HOST }}
          VM_USER: ${{ secrets.AZURE_USER }}
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            "${VM_USER}@${VM_HOST}" \
            "SERVICE_NAME='${SERVICE_NAME}' \
             DEPLOY_DIR='${DEPLOY_DIR}' \
             BACKUP_DIR='${BACKUP_DIR}' \
             HEALTHCHECK_URL='${HEALTHCHECK_URL}' \
             bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          test -n "${SERVICE_NAME}"
          test -n "${DEPLOY_DIR}"
          test -n "${BACKUP_DIR}"
          test -n "${HEALTHCHECK_URL}"

          rollback()
          {
            echo "=== 直前のバージョンへロールバック ==="

            # ロールバック処理中は、
            # 途中のコマンド失敗だけで終了しない
            set +e

            sudo systemctl stop \
              "${SERVICE_NAME}.service"

            if sudo test -f \
              "${BACKUP_DIR}/A_exercise_DB.Presentations.dll"; then

              sudo rsync \
                -a \
                --delete \
                --exclude 'wwwroot/images/products/' \
                "${BACKUP_DIR}/" \
                "${DEPLOY_DIR}/"

              sudo mkdir -p \
                "${DEPLOY_DIR}/wwwroot/images/products"

              sudo chown \
                -R fullness:fullness \
                "${DEPLOY_DIR}"

              echo "直前の成果物を復元しました"
            else
              echo "復元可能な成果物がありません"
            fi

            if sudo test -f \
              /etc/fullness/api.env.previous; then

              sudo install \
                -o root \
                -g fullness \
                -m 640 \
                /etc/fullness/api.env.previous \
                /etc/fullness/api.env

              echo "直前のapi.envを復元しました"
            else
              echo "復元可能なapi.envがありません"
            fi

            sudo systemctl daemon-reload

            sudo systemctl restart \
              "${SERVICE_NAME}.service"

            sleep 8

            echo "=== ロールバック後の状態 ==="

            sudo systemctl \
              --no-pager \
              --full \
              status "${SERVICE_NAME}.service"

            curl \
              --fail \
              --connect-timeout 5 \
              --silent \
              --show-error \
              --output /dev/null \
              "${HEALTHCHECK_URL}"

            echo "デプロイに失敗したため、直前のバージョンへ戻しました"

            rm -rf \
              /tmp/fullness-publish \
              /tmp/api.env

            exit 1
          }

          echo "=== systemd設定を再読み込み ==="

          sudo systemctl daemon-reload

          echo "=== fullness-apiを有効化 ==="

          sudo systemctl enable \
            "${SERVICE_NAME}.service"

          echo "=== fullness-apiを再起動 ==="

          if ! sudo systemctl restart \
            "${SERVICE_NAME}.service"; then

            echo "サービスの再起動に失敗しました"

            sudo journalctl \
              -u "${SERVICE_NAME}.service" \
              -n 100 \
              --no-pager

            rollback
          fi

          sleep 8

          echo "=== active状態を確認 ==="

          if ! sudo systemctl is-active \
            --quiet "${SERVICE_NAME}.service"; then

            echo "サービスがactiveになりませんでした"

            sudo journalctl \
              -u "${SERVICE_NAME}.service" \
              -n 100 \
              --no-pager

            rollback
          fi

          echo "=== Swaggerへの接続を確認 ==="

          if ! curl \
            --fail \
            --retry 5 \
            --retry-connrefused \
            --retry-delay 2 \
            --connect-timeout 5 \
            --silent \
            --show-error \
            --output /dev/null \
            "${HEALTHCHECK_URL}"; then

            echo "Swaggerへ接続できませんでした"

            sudo journalctl \
              -u "${SERVICE_NAME}.service" \
              -n 100 \
              --no-pager

            rollback
          fi

          echo "=== 起動状態 ==="

          sudo systemctl \
            --no-pager \
            --full \
            status "${SERVICE_NAME}.service"

          echo "=== デプロイ完了 ==="

          echo "fullness-apiが正常に起動しました"

          echo "=== 一時ファイルを削除 ==="

          rm -rf \
            /tmp/fullness-publish \
            /tmp/api.env
          REMOTE_SCRIPT